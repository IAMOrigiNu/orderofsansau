<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Seedling/plant badge -->
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d6b1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5016;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stem -->
  <path d="M32 50 Q30 40 28 35 L30 20" stroke="#2d5016" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M28 35 Q18 32 15 28 Q12 24 15 20 Q18 18 22 20 Q26 24 28 35 Z" fill="url(#leafGrad)" stroke="#2d5016" stroke-width="1.5"/>
  <!-- Leaf veins left -->
  <path d="M28 35 L22 28 M28 35 L20 30 M28 35 L18 25" stroke="#2d5016" stroke-width="0.8" opacity="0.4"/>
  <!-- Right leaf -->
  <path d="M30 20 Q40 18 45 16 Q50 15 52 18 Q54 22 50 26 Q45 28 30 20 Z" fill="url(#leafGrad)" stroke="#2d5016" stroke-width="1.5"/>
  <!-- Leaf veins right -->
  <path d="M30 20 L38 18 M30 20 L42 17 M30 20 L46 19" stroke="#2d5016" stroke-width="0.8" opacity="0.4"/>
  <!-- Soil -->
  <ellipse cx="32" cy="50" rx="12" ry="4" fill="#8b6f47" opacity="0.6"/>
</svg>
